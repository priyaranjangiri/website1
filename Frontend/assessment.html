<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LearnHub Assessment</title>

    <link rel="icon"
          type="image/svg+xml"
          href="assets/logo.jpeg">

    <link rel="stylesheet"
          href="assessment.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="brand">

            <img
                src="assets/logo.jpeg"
                alt="LearnHub Logo"
                class="brand-logo"
            >

            <span>
                Learn<span class="brand-highlight">Hub</span>
            </span>

        </div>

        <div class="timeline">

            <div class="tl-item active">

                <div class="tl-dot">
                    1
                </div>

                <div class="tl-label">

                    Knowledge

                    <small>
                        Skill assessment
                    </small>

                </div>

            </div>

            <div class="tl-item">

                <div class="tl-dot">
                    2
                </div>

                <div class="tl-label">

                    Learning Pace

                    <small>
                        Study habits
                    </small>

                </div>

            </div>

            <div class="tl-item">

                <div class="tl-dot">
                    3
                </div>

                <div class="tl-label">

                    Preferences

                    <small>
                        Learning style
                    </small>

                </div>

            </div>

            <div class="tl-item">

                <div class="tl-dot">
                    4
                </div>

                <div class="tl-label">

                    Goals

                    <small>
                        Career targets
                    </small>

                </div>

            </div>

        </div>

        <div class="sidebar-footer">

            LearnHub Personalized E-Learning Recommender

        </div>

    </aside>

    <div class="chat-col">

        <button
            id="backButton"
            class="back-button"
            onclick="window.location.href='dashboard.html'"
            style="display:none;"
        >
            ← Back to Dashboard
        </button>

        <div
            class="chat-thread"
            id="thread">


            <div class="msg bot">

                <div class="avatar">

                    <img
                        src="assets/logo.jpeg"
                        alt="LearnHub"
                    >

                </div>

                <div class="bubble">

                    Welcome to LearnHub.
                    Let's determine your learning profile.

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/assessment.js"></script>

</body>

</html>
